name: Flutter CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: flutter-ci
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
      - run: flutter build web --release --base-href /Noobie/ --dart-define=NOOBIE_API_BASE_URL=${NOOBIE_API_BASE_URL:-http://127.0.0.1:8091/api/noobie}
        env:
          NOOBIE_API_BASE_URL: ${{ vars.NOOBIE_API_BASE_URL }}
